<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ user.username }} - VPN Subscription</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: #0a0a0b;
      color: #e4e4e7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 22rem;
      background: #141416;
      border: 1px solid #1f1f23;
      border-radius: 1rem;
      padding: 1.5rem;
    }

    .header {
      text-align: center;
      margin-bottom: 1.25rem;
    }

    .header h1 {
      font-size: 1.125rem;
      font-weight: 600;
      color: #fafafa;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .stat {
      background: #0c0c0e;
      border-radius: 0.5rem;
      padding: 0.625rem;
      text-align: center;
    }

    .stat-label {
      font-size: 0.625rem;
      color: #71717a;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-value {
      font-size: 0.8125rem;
      font-weight: 600;
      color: #fafafa;
      margin-top: 0.25rem;
    }

    .qr-wrap {
      margin-bottom: 1.25rem;
    }

    .qr-box {
      background: #fff;
      padding: 0.75rem;
      border-radius: 0.5rem;
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .qr-box>div {
      width: 100% !important;
      height: 100% !important;
      max-width: 100%;
      max-height: 100%;
      overflow: hidden;
    }

    .qr-box canvas,
    .qr-box img,
    .qr-box table {
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
    }

    .link-row {
      margin-bottom: 1rem;
    }

    .link-row label {
      display: block;
      font-size: 0.625rem;
      color: #71717a;
      margin-bottom: 0.375rem;
    }

    .link-box {
      background: #0c0c0e;
      border-radius: 0.5rem;
      padding: 0.625rem 0.75rem;
    }

    .link-box .text {
      font-size: 0.75rem;
      color: #d4d4d8;
      word-break: break-all;
      font-family: ui-monospace, monospace;
      user-select: all;
    }

    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .btn {
      width: 100%;
      padding: 0.625rem 0.75rem;
      font-size: 0.8125rem;
      font-weight: 500;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.15s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn-outline {
      background: #22c55e;
      color: white;
    }

    .btn-hiddify {
      background: #0ea5e9;
      color: white;
    }

    .btn-v2box {
      background: #27272a;
      color: #e4e4e7;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error {
      color: #ef4444;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="header">
      <h1>{{ user.username }}</h1>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Expires</div>
        <div class="stat-value" id="expire">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Used</div>
        <div class="stat-value" id="used">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Limit</div>
        <div class="stat-value" id="limit">—</div>
      </div>
    </div>

    <div class="qr-wrap">
      <div class="qr-box">
        <div id="qrcode"></div>
      </div>
    </div>

    <div class="link-row">
      <label>ss:// Outline</label>
      <div class="link-box">
        <span class="text" id="ssLink">Loading...</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-outline" id="openOutlineBtn" type="button">Outline ဖြင့်ဖွင့်ရန်</button>
      <button class="btn btn-hiddify" id="openHiddifyBtn" type="button">Hiddify ဖြင့်ဖွင့်ရန်</button>
      <button class="btn btn-v2box" id="openV2boxBtn" type="button">V2Box ဖြင့်ဖွင့်ရန်</button>
    </div>
  </div>

  <script>
    (function () {
      const baseUrl = window.location.href.split('?')[0].replace(/\/$/, '');
      const subUrl = baseUrl + '/';
      const infoUrl = baseUrl + '/info';

      const expireEl = document.getElementById('expire');
      const usedEl = document.getElementById('used');
      const limitEl = document.getElementById('limit');
      const ssLinkEl = document.getElementById('ssLink');
      const qrcodeEl = document.getElementById('qrcode');
      const openOutlineBtn = document.getElementById('openOutlineBtn');
      const openHiddifyBtn = document.getElementById('openHiddifyBtn');
      const openV2boxBtn = document.getElementById('openV2boxBtn');

      function fmtBytes(b) {
        if (b === 0 || b == null) return '0';
        const gb = b / (1024 * 1024 * 1024);
        return gb >= 0.01 ? gb.toFixed(2) + ' GB' : (b / (1024 * 1024)).toFixed(1) + ' MB';
      }

      function fmtDate(ts) {
        if (!ts || ts === 0) return 'Never';
        const d = new Date(ts * 1000);
        return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
      }

      function renderQR(text) {
        qrcodeEl.innerHTML = '';
        if (typeof QRCode !== 'undefined') {
          var box = qrcodeEl.closest('.qr-box');
          var size = box ? Math.min(box.offsetWidth, box.offsetHeight) - 16 : 260;
          new QRCode(qrcodeEl, { text: text, width: size, height: size });
        }
      }

      fetch(infoUrl)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          expireEl.textContent = fmtDate(data.expire);
          usedEl.textContent = fmtBytes(data.used_traffic);
          limitEl.textContent = data.data_limit === 0 ? '∞' : fmtBytes(data.data_limit);

          var ssLink = '';
          if (data.links && data.links.length) {
            var found = data.links.find(function (l) { return l.indexOf('ss://') === 0; });
            ssLink = found || data.links[0] || '';
          }
          if (ssLink) {
            ssLinkEl.textContent = ssLink;
            ssLinkEl.classList.remove('loading');
            renderQR(ssLink);
            openOutlineBtn.disabled = false;
          } else {
            ssLinkEl.textContent = 'No ss:// link';
            ssLinkEl.classList.add('error');
            renderQR(subUrl);
            openOutlineBtn.disabled = true;
          }
        })
        .catch(function () {
          expireEl.textContent = '—';
          usedEl.textContent = '—';
          limitEl.textContent = '—';
          ssLinkEl.textContent = 'Could not load info';
          ssLinkEl.classList.add('error');
          renderQR(subUrl);
          openOutlineBtn.disabled = true;
        });

      openOutlineBtn.addEventListener('click', function () {
        if (openOutlineBtn.disabled) return;
        var link = ssLinkEl.textContent;
        if (link && link.indexOf('ss://') === 0) {
          window.location.href = link;
        }
      });

      openHiddifyBtn.addEventListener('click', function () {
        var link = ssLinkEl.textContent;
        var importLink = (link && link.indexOf('ss://') === 0) ? link : subUrl;
        window.location.href = 'hiddify://import/' + encodeURIComponent(importLink) + '#VPN';
      });

      openV2boxBtn.addEventListener('click', function () {
        window.location.href = 'v2box://add?url=' + encodeURIComponent(subUrl);
      });

    })();
  </script>
</body>

</html>
